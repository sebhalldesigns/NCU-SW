# NCU board config for STM32H745 with corrupted option bytes
# This board cannot do resets - they cause HardFault due to bad option bytes

source [find interface/stlink.cfg]
source [find target/stm32h7x.cfg]

# Disable all reset types - this chip cannot reset cleanly
reset_config none

# Use DTCM as work area (always clocked, no setup needed)
stm32h7x.cpu0 configure -work-area-phys 0x20000000 -work-area-size 0x10000 -work-area-backup 1

# Override reset to do a manual boot instead
stm32h7x.cpu0 configure -event reset-init {
    # Clear fault flags
    mww 0xE000ED2C 0xFFFFFFFF
    mww 0xE000ED28 0xFFFFFFFF
    # Set VTOR
    mww 0xE000ED08 0x08000000
    # Read vector table for SP and PC
    set vtable [read_memory 0x08000000 32 2]
    set sp [lindex $vtable 0]
    set pc [lindex $vtable 1]
    # Clear thumb bit from reset vector for PC
    set pc [expr {$pc & 0xFFFFFFFE}]
    reg xpsr 0x01000000
    reg sp $sp
    reg pc $pc
}
